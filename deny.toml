# cargo-deny configuration — the dependency allowlist gate (the Rust equivalent of
# ristgo's `make check-deps`). Enforces the project's posture: pure Rust, no FFI,
# permissive licenses only, crates.io only. Run with `cargo deny check`.

[graph]
all-features = true

[advisories]
# Fail on any RUSTSEC advisory for a crate in the graph.
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses only. No copyleft (GPL/AGPL/LGPL) in the dependency graph.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions are noise, not an error, while the tree is small.
multiple-versions = "warn"
wildcards = "allow"
# No FFI / no C crypto: the project is `#![forbid(unsafe_code)]` and pure Rust.
# These pull in OpenSSL/aws-lc/assembly and are banned outright. If one ever
# appears transitively, that is a posture violation to resolve, not to allow.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
    { name = "ring" },
]

[sources]
# Only crates.io. No git or alternative registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
