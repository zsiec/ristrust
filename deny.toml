# cargo-deny configuration — the dependency allowlist gate (the Rust equivalent of
# ristgo's `make check-deps`). Enforces the project's posture: pure Rust, no FFI,
# permissive licenses only, crates.io only. Run with `cargo deny check`.

[graph]
all-features = true

[advisories]
# Fail on any RUSTSEC advisory for a crate in the graph.
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack": a timing sidechannel in the `rsa`
    # crate's PKCS#1 v1.5 decryption (no fixed upstream release). It is pulled in
    # ONLY by the optional `--features dtls` RSA suites, which are not in the
    # default build and not a libRIST interop gate. The exposure is narrow and
    # bounded: an attacker needs precise local timing of repeated RSA *decryptions*
    # to recover a key. The only suite performing RSA decryption is
    # RSA_WITH_NULL_SHA256, which is OFF by default (gated behind allow_null_cipher);
    # the ECDHE_RSA suites only *verify* RSA signatures (not affected by Marvin) and
    # are forward-secret. TR-06-2 §6.2 mandates these suites, so DTLS conformance
    # requires the dependency; the risk is accepted for the off-by-default,
    # feature-gated DTLS layer.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
# Permissive licenses only. No copyleft (GPL/AGPL/LGPL) in the dependency graph.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions are noise, not an error, while the tree is small.
multiple-versions = "warn"
wildcards = "allow"
# No FFI / no C crypto: the project is `#![forbid(unsafe_code)]` and pure Rust.
# These pull in OpenSSL/aws-lc/assembly and are banned outright. If one ever
# appears transitively, that is a posture violation to resolve, not to allow.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
    { name = "ring" },
]

[sources]
# Only crates.io. No git or alternative registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
